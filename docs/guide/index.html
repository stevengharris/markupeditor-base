<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Developer's Guide</title>
        <meta name="viewport" charset="utf-8" content="width=device-width, initial-scale=1.0">
        <!-- Use preferred color scheme -->
        <link href="../styles/index.css" rel="stylesheet">
        <!-- Why load this stylesheet here? Just so the overall page has the same style as the MarkupEditor itself. -->
        <link href="../styles/markup.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    </head>
    <body>
        <p align="center">
            <img alt="The MarkupEditor logo" src="../resources/markupeditor.svg" width="96px" height="96px" >
        </p>
        <div id="content"></div>
        <script>
            let filename = 'guide.html';
            fetch(filename)
            .then((response) => response.text())
            .then((text) => {
                document.getElementById('content').innerHTML = text
                hljs.highlightAll();
            })
            .catch(error => {
                document.getElementById('content').innerHTML = 
                    `<p>
                        Failed to load ${filename}. 
                        You may be trying to load HTML from a local file in a browser.
                    </p>`
            });
        </script>
    </body>
</html>
